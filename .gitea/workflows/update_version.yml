name: Update Version

on:
  push:
    branches:
      - main
      - master

jobs:
  update-version:
    name: Update Version
    runs-on: ubuntu-latest
    # Пропускаем запуск, если коммит сделал сам бот (избегаем бесконечного цикла)
    if: github.actor != 'gitea-actions[bot]' && github.actor != 'Gitea Actions Bot'
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install python-semantic-release

      - name: Configure Git
        run: |
          git config --local user.email "actions@gitea.local"
          git config --local user.name "Gitea Actions Bot"

      - name: Run semantic-release
        env:
          GITEA_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          unset GITHUB_SERVER_URL
          unset GITHUB_API_URL
          unset GITHUB_REPOSITORY

          semantic-release version